#!/usr/bin/env bash

# Set prefix to a
# set -g prefix C-b

set -s escape-time 0

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'catppuccin/tmux'

set -g @continuum-restore 'on'

set -g @resurrect-dir '~/.tmux/resurrect-custom'

set -g focus-events on

# set -g default-terminal 'tmux-256color'
# set -ga terminal-overrides ',xterm*:Tc:sitm=\E[3m'

# Undercurl
# set -g default-terminal "${TERM}"
# set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
# set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours - needs tmux-3.0

# Open new windows/panes in fish when it's installed, else fall back to zsh
# (guarded so tmux still spawns panes on machines without fish).
if-shell 'test -x /opt/homebrew/bin/fish' \
  'set -g default-shell /opt/homebrew/bin/fish' \
  'set -g default-shell /bin/zsh'

# Open new/split panes with the path of the current pane
unbind c
bind c new-window -c '#{pane_current_path}'
unbind %
bind % split-window -h -c '#{pane_current_path}'
unbind '"'
bind '"' split-window -v -c '#{pane_current_path}'

# set first window to index 1 (not 0)
set -g base-index 1
setw -g pane-base-index 1

bind-key C-b last-window

# Vim-like key bindings for pane navigation (default uses cursor keys)
unbind h
bind h select-pane -L
unbind j
bind j select-pane -D
unbind k
bind k select-pane -U
unbind l
bind l select-pane -R

bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Resizing (mouse also works)
unbind Left
bind -r Left resize-pane -L 5
unbind Right
bind -r Right resize-pane -R 5
unbind Down
bind -r Down resize-pane -D 5
unbind Up
bind -r Up resize-pane -U 5

# Intuitive window-splitting keys
bind "/" split-window -h -c '#{pane_current_path}' # normally prefix-%
bind "-" split-window -v -c '#{pane_current_path}' # normally prefix-"

# Automatically renumber window numbers on closing a pane
set -g renumber-windows on

# vi-style controls in copy mode
set -g status-keys vi
set -g mode-keys vi

# Mouse can be used to select panes, select windows (by clicking on the status
# bar), resize panes. For default bindings see `tmux list-keys` and `tmux
# list-keys -t vi-copy`
set -g mouse on

# Don't wrap searches; it's super confusing given tmux's reverse-ordering of
# position info in copy mode
set -w -g wrap-search off

source-file ~/dotfiles/tmux/window-navigation.conf
source-file ~/dotfiles/tmux/theme-catpuccin.conf
# source-file ~/dotfiles/tmux/gruv-box.conf

# awp's docs suggest `awp deck \; run-shell "awp deck-cleanup"`, but that breaks
# here: display-popup -E doesn't block, so run-shell fires immediately (wrong
# order), and run-shell uses /bin/sh with the server's stunted PATH (no awp/tmux)
# so cleanup silently fails. Running both inside the popup fixes the ordering —
# `;` sequences cleanup to run only after `awp deck` exits.
#
# NOTE: -E runs the command via `fish -c`, which is NON-interactive, so it exits
# config.fish before `mise activate` — meaning mise-managed tools aren't on PATH
# unless we add them. The shims dir gives us `go`, but NOT `awp`: awp is a
# `go install` binary that lives in go's GOBIN (~/.local/share/mise/installs/go/
# <version>/bin), which is version-specific. A `mise up` that bumps the go
# version moves that dir, so any hardcoded/inherited path goes stale and the
# popup dies with `awp: command not found` (exits instantly). Resolve it at
# launch time via `go env GOBIN` so the binding survives go upgrades.
bind a display-popup -E -w 90% -h 90% "fish_add_path $HOME/.local/share/mise/shims; fish_add_path (go env GOBIN); awp deck; awp deck-cleanup"
# bind A display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "awp deck --scope=attention" \; run-shell "awp deck-cleanup"

# Ghostty's cmd+' forwards prefix-' here → opens assistant-tui in a popup.
# --floating turns Esc into a quit when there's nothing left to dismiss.
bind "'" display-popup -E -w 90% -h 90% "fish_add_path $HOME/.local/share/mise/shims; fish_add_path (go env GOBIN); assistant-tui --floating"

set -g status-right "#[fg=#{@thm_fg},bg=#{@thm_bg}] #(PATH=\"$($HOME/.local/share/mise/shims/go env GOBIN):$HOME/.local/share/mise/shims:$PATH\" awp internal unread-summary) #{E:@catppuccin_status_session}"
set -g status-interval 5

# tpm shells out to the `tmux` binary, but the server can start with a PATH
# that lacks /opt/homebrew/bin (e.g. launched from Ghostty/launchd). Prepend it
# just for this invocation so tpm always finds tmux, without globally
# overriding PATH for every pane.
run 'PATH="$HOME/go/bin:/opt/homebrew/bin:$PATH" ~/.tmux/plugins/tpm/tpm'
